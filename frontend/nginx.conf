server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    location /static/ {
        proxy_pass http://blaashal-configurator-backend:8000;
    }

    location /api/ {
        proxy_pass http://blaashal-configurator-backend:8000;
    }

    location / {
        try_files $uri /index.html;
    }
}